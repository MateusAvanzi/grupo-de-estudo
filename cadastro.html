<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro - EstudaJunto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="page single">
    <section class="phone">
      <div class="screen">
        <p class="time">9:41</p>

        <header class="brand">
          <div class="logo small" aria-hidden="true"></div>
          <div>
            <h1>Criar conta</h1>
            <p>Entre nos grupos certos.</p>
          </div>
        </header>

        <form class="form" action="#">
          <input type="text" placeholder="Nome completo" />
          <input type="email" placeholder="seu@email.com" />
          <input type="password" placeholder="Senha" />
          <input type="password" placeholder="Confirmar senha" />
          <button type="submit">Criar conta</button>
        </form>

        <p class="terms">Ao continuar, voce aceita os <a href="#">Termos de Uso</a>.</p>

        <div class="divider"></div>

        <p class="signin">Ja tem uma conta? <a href="./login.html">Entrar</a></p>
      </div>
    </section>
  </main>
</body>
</html>
