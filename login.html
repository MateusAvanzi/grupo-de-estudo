<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - EstudaJunto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="page single">
    <section class="phone">
      <div class="screen">
        <p class="time">9:41</p>

        <header class="brand">
          <div class="logo" aria-hidden="true"></div>
          <div>
            <h1>EstudaJunto</h1>
            <p>Grupos pra aprender melhor.</p>
          </div>
        </header>

        <form class="form" action="#">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="exemplo@email.com" />

          <label for="senha">Senha</label>
          <input id="senha" type="password" value="12345678" />

          <a class="helper-link" href="#">Esqueci minha senha</a>

          <button type="submit">Entrar</button>
        </form>

        <aside class="signup-box">
          <p class="strong">Novo por aqui?</p>
          <p>Crie sua conta e encontre uma turma.</p>
          <a href="./cadastro.html">Criar conta</a>
        </aside>
      </div>
    </section>
  </main>
</body>
</html>
